# Auto-generated by scaffold_analysis.py — edit as needed for this analysis.
# This is the pixi environment for the analysis. All scripts run through:
#   pixi run py script.py
#
# To add a dependency: add it below, then `pixi install` from this directory.

[workspace]
name = "lund_jet_plane"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.11"
tectonic = ">=0.15"

# --- Core stack (always needed) ---
[pypi-dependencies]
uproot = ">=5.0"
awkward = ">=2.0"
hist = ">=2.7"
boost-histogram = ">=1.4"
numpy = ">=1.24"
scipy = ">=1.11"
matplotlib = ">=3.8"
mplhep = ">=1.1.0"
vector = ">=1.1"
particle = ">=0.23"
rich = ">=13.0"
# Jet clustering
fastjet = ">=3.4"
# --- Uncomment groups below as needed (Phase 3/4 executors: uncomment what you need) ---
# # Statistical models and fitting
# pyhf = ">=0.7"
# cabinetry = ">=0.6"
# iminuit = ">=2.25"
# # Unbinned likelihood fits
# zfit = ">=0.20"
# # MVA / classification
# xgboost = ">=2.0"
# scikit-learn = ">=1.3"
# # Columnar event processing at scale
# coffea = ">=2024.0"

[tasks]
py = "python"
# build-pdf compiles a .tex file to PDF via tectonic.
# Usage: pixi run build-pdf -- path/to/ANALYSIS_NOTE.tex
build-pdf = "tectonic"
lint-plots = "python conventions/lint_plots.py ."
# --- Phase 3 tasks ---
p3-process = "python phase3_selection/src/01_process_all.py"
p3-correction = "python phase3_selection/src/02_correction_infrastructure.py"
p3-closure = "python phase3_selection/src/03_closure_test.py"
p3-approach = "python phase3_selection/src/04_approach_comparison.py"
p3-datamc = "python phase3_selection/src/05_data_mc_lund.py"
p3-plots = "python phase3_selection/src/06_plot_all.py"
p3-all = "python phase3_selection/src/01_process_all.py && python phase3_selection/src/02_correction_infrastructure.py && python phase3_selection/src/05_data_mc_lund.py && python phase3_selection/src/03_closure_test.py && python phase3_selection/src/04_approach_comparison.py && python phase3_selection/src/06_plot_all.py"
# The "all" task chains the full sequence
all = "python phase3_selection/src/01_process_all.py && python phase3_selection/src/02_correction_infrastructure.py && python phase3_selection/src/05_data_mc_lund.py && python phase3_selection/src/03_closure_test.py && python phase3_selection/src/04_approach_comparison.py && python phase3_selection/src/06_plot_all.py"
